server:
  listen: 127.0.0.1:8080
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 10s
  fetch_timeout: 20s
  max_response_bytes: 8388608

subscriptions:
  - name: default-subscription
    secret: "123e4567-e89b-42d3-a456-426614174000"
    default_platform: V2rayN
    platform_options:
      happ:
        routing: "happ://routing/onadd/REPLACE_WITH_YOUR_ROUTING_PAYLOAD"
        profile_update_interval: 1
        profile_title: "UniSub"
        support_url: "https://example.com/support"
        profile_web_page_url: "https://example.com/profile"
        announce: "Welcome to UniSub"
        routing_enable: true
        subscription_autoconnect: true
        subscription_autoconnect_type: "lastused"
        ping_type: "proxy"
        change_user_agent: "Happ iOS"
        app_auto_start: true
        subscription_auto_update_enable: true
        subscription_auto_update_open_enable: true
      clash:
        template: "./Self.ini"
    sources:
      - name: manual-links
        type: manual
        style: link_line
        platforms: [V2rayN, Happ]
        prefix: "[Manual] "
        entries:
          - "vmess://REPLACE_WITH_YOUR_NODE"
          - "vless://REPLACE_WITH_YOUR_NODE"
          - "ss://REPLACE_WITH_YOUR_NODE"

      - name: manual-clash-proxy
        type: manual
        style: clash_proxy
        platforms: [Clash]
        prefix: "[ClashManual] "
        entries:
          - "{ name: 'Example Clash Node', type: vmess, server: demo.example.com, port: 443, uuid: 123e4567-e89b-42d3-a456-426614174001, alterId: 0, cipher: auto, udp: true, network: ws, ws-opts: { path: /websocket, headers: { Host: demo-edge.example.com } } }"

      - name: upstream-base64-lines
        type: remote
        style: link_lines_base64
        platforms: [V2rayN, Happ]
        prefix: "[JP] "
        remote_type: base64_lines
        url: "https://example.com/api/v1/client/subscribe?token=REPLACE_ME"
        refresh_interval: 30m
        timeout: 15s
        include_patterns: []
        exclude_patterns:
          - "剩余流量"
          - "套餐到期"

      - name: upstream-clash-yaml
        type: remote
        style: clash_proxies_yaml
        platforms: [Clash]
        prefix: "[ClashRemote] "
        url: "https://example.com/clash-subscription.yaml"
        request_headers:
          User-Agent: "clash-verge"
        refresh_interval: 30m
        timeout: 15s
        include_patterns: []
        exclude_patterns:
          - "剩余流量"
